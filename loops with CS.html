<!--Create a simple program using loops with conditional statements-->
<!DOCTYPE html>
<html>
    <head>
        <title>Loops with Conditional Statements</title>
        <script>
            function show() {
                var i,c = 0;
                for(i=1; i<=10; i++) {
                    if(i%2 === 0) {
                        c++;
                        document.write(i + "<br>");
                    }
                }
                document.write("Total even numbers: " + c);
            }
        </script>
    </head>
    <body>
        <h1>Loops with Conditional Statements</h1>
        <button onclick="show()">Click Me</button>
    </body>
</html>
