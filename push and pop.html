<!--Create a simple program to push and pop elements-->
<!DOCTYPE html>
<html>
    <head>
        <script>
            function show() {
                var arr = [];
                arr.push(1);
                arr.push(2);
                arr.push(5);
                arr.push(8);
                arr.pop();
                arr.pop();
                alert(arr);
            }
        </script>
    </head>
    <body>
        <button onclick="show()">Show Array</button>
    </body>
</html>
