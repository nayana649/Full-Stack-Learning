<!--Create an image so that when you click on the first image, it displays the second image on your web page and when you click on the second image both images should be hidden-->
<!DOCTYPE html>
<html>
    <head>
        <title>Image Toggle</title>
    </head>
    <body>
        <img id="image1" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjCv0ZIUJ_eshTiEOdAjC7nVlp-hH-GfBmBw&s" 
             alt="First Image" style="width: 200px; display: block; cursor: pointer;" onclick="Toggleimages()">

        <img id="image2" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRf0J-W_xQ8nJ2T7SeBHdkUc68NZIE0Zb4woQ&s" 
             alt="Second Image" style="width: 200px; display: none; cursor: pointer;" onclick="Toggleimages()">

        <script>
            function Toggleimages() {
                var image1 = document.getElementById("image1");
                var image2 = document.getElementById("image2");

                // Step 1: If image1 is visible and image2 is hidden
                if (image1.style.display === "block" && image2.style.display === "none") {
                    image1.style.display = "none";  // Hide first
                    image2.style.display = "block"; // Show second
                } 
                // Step 2: If image2 is already visible, hide both
                else {
                    image1.style.display = "none";
                    image2.style.display = "none";
                }
            }
        </script>
    </body>
</html>
