<!--Create a simple program to insert an element into an array-->
<!DOCTYPE html>
<html>
    <head>
        <script>
            function show() {
                var arr = []
                for (i=0; i<=20; i++) {
                    if (i%2 == 0) {
                        continue;
                    }
                    arr.push(i);
                }
                alert(arr);
            }
        </script>
    </head>
    <body>
        <button onclick="show()">Show Me</button>
    </body>
</html>
