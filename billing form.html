<!--Create a simple billing form-->
<!Doctype html>
<html>
    <head>
        <title>Billing Form</title>
    </head>
    <body>
        <form method="post" onsubmit="alert('Form Submitted Successfully!!!')">
            <h1>Billing Form</h1>
            <label for="firstname">First Name:</label>
            <input type="text" id="firstname" name="firstname" pattern="[A-Za-z ]+" required><br><br>
            <label for="lastname">Last Name:</label>
            <input type="text" id="lastname" name="lastname" pattern="[A-Za-z ]+" required><br><br>
            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="Gender" value="male" required>
            <label for="male">Male</label>
            <input type="radio" id="female" name="Gender" value="female" required>
            <label for="female">Female</label><br><br>
            <label for="languages">Languages:</label>
            <input type="checkbox" id="english" name="Languages" value="English">
            <label for="english">English</label> 
            <input type="checkbox" id="hindi" name="Languages" value="Hindi">
            <label for="hindi">Hindi</label>
            <input type="checkbox" id="kannada" name="Languages" value="kannada">
            <label for="kannada">Kannada</label> 
            <input type="checkbox" id="telugu" name="Languages" value="telugu">
            <label for="telugu">Telugu</label><br><br>
            <label for="mail">Email:</label>
            <input type="email" id="mail" name="mail" required><br><br>
            <label for="address">Residential Address:</label>
            <input type="text" id="address" name="address" required><br><br>
            <label>State:</label>
            <select id="state" name="state" required>
                <option value="">Select a state</option>
                <option value="KA">Karnataka</option>
                <option value="KE">Kerala</option>
                <option value="AP">Andhra Pradesh</option>
            </select><br><br>
            <label for="zip">Zip Code:</label>
            <input type="number" id="zip" name="zip" required><br><br>
            <label for="card type">Credit Card Type:</label>
            <select id="card type" name="card type" required>
                <option value="">Select a card type</option>
                <option value="visa">Visa</option>
                <option value="mastercard">Mastercard</option>
                <option value="amex">American Express</option>
            </select><br><br>
            <input type="submit" value="Submit">
         </form>
    </body>
</html>
