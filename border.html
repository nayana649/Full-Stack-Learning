<!--Create a simple program using Border property of CSS-->
<!DOCTYPE html>
<html>
    <head>
        <title>Border</title>
        <style>
            .work {
                padding: 20px 10px 30px 40px;
                border: 4px solid green;
            }
        </style>
    </head>
    <body>
        <div class="work">
            <h1>Python Developer</h1>
            <p>RAG based SOP Assistant</p>
        </div>
    </body>
</html>
