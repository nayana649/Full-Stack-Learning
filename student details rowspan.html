<!--Generating a Student's details using rowspan-->
<!DOCTYPE html>
<html>
    <head>
        <title>Student Details</title>
    </head>
    <body>
        <table border="10" align="left">
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>Score</th>
            </tr>
            <tr>
                <td>Akash</td>
                <td>65</td>
                <td>85</td>
                <td rowspan="3" align="center">ELECTRONICS AND COMMUNICATION DEPARTMENT</td>
            </tr>
            <tr>
                <td>Abhiram</td>
                <td>38</td>
                <td>40</td>
            </tr>
            <tr>
                <td>Nayana</td>
                <td>126</td>
                <td>100</td>
            </tr>
        </table>
    </body>
</html>
