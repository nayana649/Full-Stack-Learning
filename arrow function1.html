<!--Create a simple arrow function-->
<!DOCTYPE html>
<html>
    <head>
        <title>Arrow Function Example</title>
        <script>
            const add = (a, b) => a + b;
            alert(add(5, 3));
        </script>
    </head>
    <body>
        <button onclick="alert(add(5, 3))">Add</button>
    </body>
</html>

<!--To add user input values-->
<!DOCTYPE html>
<html>
    <head>
        <script>
            const add = (x, y, z) => x + y + z;

            const calculate = () => {
                    const num1 = parseInt(document.getElementById("n1").value);
                    const num2 = parseInt(document.getElementById("n2").value);
                    const num3 = parseInt(document.getElementById("n3").value);
                    alert("The sum is: " + add(num1, num2, num3));
            }
        </script>
    </head>
    <body>
        <h1>Add Three Numbers</h1>
        <input type="number" id="n1" placeholder="Enter first number">
        <input type="number" id="n2" placeholder="Enter second number">
        <input type="number" id="n3" placeholder="Enter third number">
        <button onclick="calculate()">Calculate Sum</button>
    </body>
</html>
