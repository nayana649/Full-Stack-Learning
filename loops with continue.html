<!--Create a simple loop with a continue statement-->
<!DOCTYPE html>
<html>
  <head>
    <script>
      function show()
      {
        var i;
        for(i=4;i<=20;i++)
      {
        if(i%3==0 && i%5==0)
      {
        continue;
      }
      
      }
      alert(i);
      
      }
      

    </script>
  </head>
  <body>
    <button onclick="show()">Click</button>
  </body>
</html>
