<!--Create a simple program on Attribute Selector-->
<!DOCTYPE html>
<html>
    <head>
        <title>Attribute Selector</title>
        <style>
            a[target]  {
                background-color: red;
            }
        </style>
    </head>
    <body>
        <a href="https://www.facebook.com" target="_blank">Facebook</a>
    </body>
</html>
