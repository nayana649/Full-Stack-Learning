<!--Create a simple program-->
<!DOCTYPE html>
<html>
    <head>
        <title>Pseudo Class Selector</title>
        <style>
            li:first-child {
                background-color: green;
            }
        </style>
    </head>
    <body>
        <ol>
            <li>One</li>
            <li>Two</li>
            <li>Three</li>
        </ol>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Pseudo Class Selector</title>
        <style>
            li:last-child {
                background-color: red;
            }
        </style>
    </head>
    <body>
        <ol>
            <li>One</li>
            <li>Two</li>
            <li>Three</li>
        </ol>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Pseudo Class Selector</title>
        <style>
            li:nth-child(1) {
                background-color: green;
            }
        </style>
    </head>
    <body>
        <ol>
            <li>One</li>
            <li>Two</li>
            <li>Three</li>
        </ol>
    </body>
</html>
