<!DOCTYPE html>
<html>
    <head>
        <title>CSS Simple Selector</title>
        <style>
            .one {
                font-size: 40px;
                background-color: aqua;
                color: brown;
            }
        </style>
    </head>
    <body>
        <p class="one">First Line</p>
        <p class="one">Second Line</p>
    </body>
</html>
