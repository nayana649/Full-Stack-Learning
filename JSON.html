<!DOCTYPE HTML>
<html>
    <head>
        <title>JSON</title>
    </head>
    <body>
        <h2>JSON Stringify Method in Javascript</h2>
        <script>
            function show() {
                var jsonObject = { Name : "Nayana", ID : 1254, Role : "Python Developer"};
                var jsonString = JSON.stringify(jsonObject);
                document.write(jsonString);
            }
        </script>
        <button onclick="show()">Show</button>
    </body>
</html>
