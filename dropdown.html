<html>
    <head>
        <title>CSS</title>
        <style>
            .one 
            {
                position: relative;
                background-color: blanchedalmond;
            }
            .two
            {
                display:none;
                position:absolute;
                background-color: aqua;
                padding: 12px 20px;
            }
            .one:hover .two 
            {
                display:block;
            }
        </style>
    </head>
    <body>
    <div class="one">First Menu

        <div class="two">Sub Menu</div>
    </div>
    </body>
</html>
