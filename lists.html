<!--Create a simple program to know about different types of lists-->

<!--Ordered List-->
<!DOCTYPE html>
<html>
    <head>
        <title>Lists</title>
    </head>
    <body>
        <h1>Ordered List</h1>
        <ol>
            <li>Employee Name</li>
            <li>Age</li>
            <li>Salary</li>
        </ol>
    </body>
</html>

<!--Unordered List-->
<html>
    <head>
    </head>
    <body>
        <h1>Unordered List</h2>
        <ul>
            <li>Python</li>
            <li>Java</li>
            <li>Perl</li>
        </ul>
    </body>
</html>

<!--Description List-->
<html>
    <head>
    </head>
    <body>
        <h1>Description List</h1>
        <dl>
            <dt>UPSC</dt>
            <dd>Union Public Service Commission</dd>
            <dt>IIT</dt>
            <dd>Indian Institute of Technology</dd>
            <dt>Python</dt>
            <dd>A high-level and user-friendly language.</dd>
        </dl>  
    </body>
</html>
