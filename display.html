<!--Create a simple program using Display properties in CSS-->
<!DOCTYPE html>
<html>
    <head>
        <title>Display</title>
        <style>
            body {
                text-align: center; 
            }

            div {
                background-color: yellow;
                color: red;
                padding: 10px 20px; 
                margin: 20px auto;
                border: 2px solid blue;
                display: inline-block; 
            }
        </style>
    </head>
    <body>
        <div>This is my first Web Page</div>
    </body>
</html>
