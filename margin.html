<!--Create a simple program using Margin property of CSS-->
<!DOCTYPE html>
<html>
    <head>
        <title>Margin</title>
        <style>
            div {
                background-color: aquamarine;
                margin: 10px 20px 15px 0px;
                color: black;
                border: 2px solid green;
            }
        </style>
    </head>
    <body>
        <div>Welcome to Python Class!!</div>
    </body>
</html>
