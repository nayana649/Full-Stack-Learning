<!--Create a simple program of Pseudo Class Selector-->
<html>
    <head>
        <title>Pseudo Class Selector</title>
        <style>
            .btn {
                background-color: aliceblue;
                font-size: 50px;
                color: palevioletred;
            }

            .btn:hover {
                background-color: aqua;
                color: red;
            }
        </style>
    </head>
    <body>
        <h1>Example of Pseudo Class Selector</h1>
        <button class="btn">Success is not a Destination, it's a Journey!!!</button>
    </body>
</html>


<!DOCTYPE html>
<html>
    <head>
    <style>
        .action-btn {
        background-color: aqua;
        font-size: 20px;
        }

        .action-btn:focus {
        background-color: blue;
        font-size: 40px;
        }
    </style>
    </head>
    <body>

        <h2>Simple Example</h2>
        <button class="action-btn">Interactive Button</button>

    </body>
</html>

<!DOCTYPE html>
<html>

        .action-btn {
