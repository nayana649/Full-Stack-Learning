<!--Create a simple table of multiples of 5-->
<!Doctype html>
<html>
    <head>
        <title>Multiples of 5</title>
    </head>
    <body>
        <h1>Multiples of 5</h1>
        <table border="10">
            <tr>
                <th>Number</th>
                <th>Multiple</th>
            </tr>
            <tr>
                <td>5 * 1</td>
                <td>5</td>
            </tr>
            <tr>
                <td>5 * 2</td>
                <td>10</td>
            </tr>
            <tr>
                <td>5 * 3</td>
                <td>15</td>
            </tr>
            <tr>
                <td>5 * 4</td>
                <td>20</td>
            </tr>
            <tr>
                <td>5 * 5</td>
                <td>25</td>
            </tr>
        </table>
    </body>
</html>
