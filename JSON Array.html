<!--Create a simple program of a JSON Array-->
<!DOCTYPE html>
<html>
    <head>
        <title>JSON Array Example</title>
    </head>
    <body>
        <h1>Example of JSON Array</h1>
        <script>
            function show() {
                var data = '[{"Name":"Nayana", "ID":1234}, {"Name":"Abhi", "ID":6532}, {"Name":"Vani", "ID":5263}]';
                var internList = JSON.parse(data);
                document.write("First Intern: " + internList[0].Name + "<br>");
                document.write("Second Intern: " + internList[2].Name + "<br>" );
            }
        </script>
        <button onclick="show()">Show</button>
    </body>
</html>
